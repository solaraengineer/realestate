<html lang="en">
<head>
    {% load static %}
<meta charset="utf-8"/>
<title>Homiverse – 3D Property Map</title>

<!-- Internal CSS styles -->

<link href="{% autoescape off %}{% static 'style.css' %}{% endautoescape %}" rel="stylesheet">
<link href="{% autoescape off %}{% static 'messages.css' %}{% endautoescape %}" rel="stylesheet">
{% load static %}
<link rel="stylesheet" href="{% static 'my_homes.css' %}">
<link rel="stylesheet" href="{% static 'profile.css' %}">
<link rel="stylesheet" href="{% static 'viewpoints.css' %}">
<link rel="stylesheet" href="{% static 'login.css' %}">
<link rel="stylesheet" href="{% static 'transactions.css' %}">
<link rel="stylesheet" href="{% static 'chat.css' %}">

<!-- PROPERTIES PANEL (right) -->
<style>
  html, body { height: 100%; margin: 0; }
  #cesiumContainer { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="cesiumContainer"></div>
<!-- MENU (left panel) -->
<div class="menu-panel" id="menuPanel">
<div class="menu-row">
<div class="menu-title">Menu</div>
<button aria-expanded="false" class="toggle" id="menuToggle">Expand</button>
</div>
<!-- User info -->
<div id="userInfo" style="display:none; font-weight:600; padding:4px 0 8px 12px; color:var(--accent);">
  User 1234
</div>
<div id="menuContent" style="display:none;">
<!-- ALWAYS AVAILABLE -->
<div class="section">
<!--       <div class="section-title">Available</div>   -->
<div class="section-body" style="display:block;">
<button class="btn" data-action="offers">Sale Offers</button>
<button class="btn" data-action="login">Log In</button>
</div>
</div>
<!-- After login -->
<div id="postLogin" style="display:none; margin-top:10px;">
<div class="section">
<div class="section-body" style="display:block;">
<button class="btn" data-action="homes">My Properties</button>
<button class="btn" data-action="transactions">My Transactions</button>
<button class="btn" data-action="watchlist">My Watchlist</button>
<button class="btn" data-action="messages">Messages</button>
<button class="btn" data-action="viewpoints">My Viewpoints</button>
<button class="btn" data-action="profile">My Profile</button>
<button class="btn" data-action="logout" id="logoutBtn" style="background:#ef4444;">Log Out</button>
</div>
</div>
</div>
</div>
</div>
<!-- OFFERS PANEL -->
<div class="offers-panel side-panel" id="offersPanel">
<!-- Sales -->
<div class="section">
<div class="section-header-row">
<div class="section-title section-trigger" data-target="#saleBody">Sales</div>
<button class="close-btn" data-close="offersPanel">X</button>
</div>
<div class="section-body" id="saleBody" style="display:none;">
<div id="saleFields" style="margin-top:8px;">
<div class="range-inline">
<label>Price from</label><input class="input" id="saleMin" type="number"/>
<label>to</label><input class="input" id="saleMax" type="number"/>
</div>
</div>
<button aria-pressed="false" class="toggle-btn" id="saleToggle">Show Sale Offers</button>
</div>
</div>
<!-- Auctions -->
<div class="section">
<div class="section-title section-trigger" data-target="#auctionBody">Auctions</div>
<div class="section-body" id="auctionBody" style="display:none;">
<div id="auctionFields" style="margin-top:8px;">
<div class="range-inline">
<label>Price from</label><input class="input" id="auctionMin" type="number"/>
<label>to</label><input class="input" id="auctionMax" type="number"/>
</div>
</div>
<button aria-pressed="false" class="toggle-btn" id="auctionToggle">Show Auction Offers</button>
</div>
</div>
</div>

<!-- "Your Transactions" panel – isolated -->
<div id="transactionsPanel" class="side-panel transactions-panel" style="display:none;">
  <div class="panel-header">
    <div class="panel-title">Your Transactions</div>
    <div class="panel-actions">
      <button class="btn-ghost" id="txRefreshBtn">Refresh</button>
      <button class="panel-close" data-close="transactionsPanel">X</button>
    </div>
  </div>
  <div class="panel-body">
    <div id="transactionsWrap">
      Loading...
    </div>
  </div>
</div>


<!-- OTHER PANELS (right general-purpose panel and viewpoints panel) -->
<aside class="side-panel" id="appPanel">
<div class="panel-header">
<div class="panel-title" id="appPanelTitle">Panel</div>
<button class="panel-close" data-close="appPanel">X</button>
</div>
<div id="appPanelBody" style="margin-top:10px;"></div>
</aside>

<aside class="side-panel dock-left" id="authPanel" style="left:0;">

  <div class="panel-header">
    <div class="panel-title">Log In / Register</div>
    <button class="panel-close" data-close="authPanel">X</button>
  </div>

  <div class="panel-body" style="display:grid;gap:12px;">
    <!-- LOGIN -->
    <section id="preLogin">
      <div class="card">
        <div class="card-title"></div>
        <div id="loginBody" class="card-body" style="display:grid;gap:8px;">
          <label>E-mail
            <input class="input" type="email" placeholder="you@example.com">
          </label>
          <label>Password
            <input class="input" type="password" placeholder="••••••••">
          </label>
          <a class="text-link" href="#" id="forgotPass">Send Password Reset Link</a>
          <button class="btn" id="loginBtn">Log In</button>
          <button class="btn btn-outline" id="showRegBtn" style="margin-top:8px;">Create Account</button>

        </div>
      </div>

      <!-- REGISTRATION (hidden on start) -->
      <div id="regSection" style="display:none;">
        <div class="card">
          <div class="card-title"></div>
          <div id="regBody" class="card-body" style="display:grid;gap:8px;">
            <label>Username
              <input class="input" id="regUsername" type="text" placeholder="e.g. John123">
            </label>
            <label>E-mail
              <input class="input" id="regEmail" type="email" placeholder="you@example.com">
            </label>
            <label>Password
              <input class="input" id="regPass1" type="password" placeholder="••••••••">
            </label>
            <label>Confirm Password
              <input class="input" id="regPass2" type="password" placeholder="••••••••">
            </label>

            <label>Referral:
              <input class="input" id="regReferrer" type="text" placeholder="Referrer ID/E-mail">
            </label>
            <div id="regStep1Extras">
              <label class="checkbox-row" style="display:flex;align-items:center;gap:8px;margin-top:6px;">
                <input type="checkbox" id="regAcceptTerms">
                <span>I accept the terms</span>
              </label>
            </div>
            <button class="btn" id="regBtn">Create Account</button>
          </div>
        </div>
      </div>
    </section>
  </div>
</aside>

<aside class="side-panel" id="viewpointsPanel">
<div class="panel-header">
<div class="panel-title">My Viewpoints</div>
<button class="panel-close" data-close="viewpointsPanel">X</button>
</div>
<div class="list" id="vpList" style="max-height:300px;overflow-y:auto;padding:8px;"></div>
<div class="list-item" style="gap:8px;padding:12px;border-top:1px solid var(--border);">
<input class="input" id="vpName" placeholder="Viewpoint name" style="flex:1;"/>
<button class="btn" id="vpSave" style="width:auto;white-space:nowrap;">Add Viewpoint</button>
</div>
</aside>

<aside class="side-panel" id="observationsPanel">
<div class="panel-header">
<div class="panel-title">My Watchlist</div>
<button class="panel-close" data-close="observationsPanel">X</button>
</div>
<div class="list" id="obsList" style="max-height:350px;overflow-y:auto;padding:8px;"></div>
</aside>

<!-- Chat Panel for DMs, Friends, Blocked -->
<aside class="chat-panel" id="chatPanel" style="display:none;">
</aside>

<div id="toast">OK</div>

<aside class="feature-panel" id="featurePanel">
<div class="feature-header">
<div class="feature-title" id="featureTitle">Selected Property</div>
<button class="feature-close" id="featureClose">X</button>
</div>
<div class="props" id="featureProps"></div>
<div class="feature-actions">
<button class="btn-ghost" id="fpBuy">Buy</button>
<button class="btn-ghost" id="fpWatch">Watch</button>
<button class="btn-ghost" id="fpMessage">Send Message</button>
<button class="btn-ghost" id="fpSetVP">Set Viewpoint</button>
</div>
</aside>
<script>
  // Anti-cache and global onerror
  console.log('[HTML] end of body loaded');
  window.addEventListener('error', e => {
    console.error('[window.onerror]', e.message, '@', e.filename + ':' + e.lineno + ':' + e.colno);
  });
</script>

  window.ANALYTICS_BASE = "https://analytics.homiverse.world";
  window.ANALYTICS_TOKEN = "super_secret_token_123";
</script>

<script src="{% static 'js/tiles-base.js' %}"></script>
<script src="{% static 'js/auth.js' %}"></script>
<script type="module" src="{% static 'js/init.js' %}"></script>
<script src="{% static 'js/utils.js' %}"></script>
<script src="{% static 'js/menu.js' %}"></script>
<script src="{% static 'js/viewpoints.js' %}"></script>
<script src="{% static 'js/observations.js' %}"></script>
<script src="{% static 'js/featurePanel.2025.js' %}"></script>
<script src="{% static 'js/messages.app.js' %}"></script>
<script src="{% static 'js/offers.app.js' %}"></script>
<script src="{% static 'js/chat.panel.js' %}"></script>
<script src="{% static 'js/avatars.app.js' %}"></script>
<script src="{% static 'js/modal.js' %}"></script>
<script src="{% static 'js/errorModal.js' %}"></script>
</body>
</html>
